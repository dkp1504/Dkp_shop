{% extends 'base.html' %}
{% load static %}
{% block title %}Payment Failed — Dkp shop{% endblock %}
{% block content %}
<div class="container section" style="text-align:center; padding:6rem 0;">
  <div style="width:80px;height:80px;border-radius:50%;background:rgba(224,82,82,.12);border:2px solid var(--danger);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 2rem;">✗</div>
  <h1 style="font-family:var(--font-display);font-size:3rem;font-weight:300;margin-bottom:0.5rem;">Payment Failed</h1>
  <p style="color:var(--text-muted);margin-bottom:2.5rem;">Something went wrong with your payment. Please try again.</p>
  <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
    <a href="{% url 'cart' %}" class="btn btn-primary">Return to Cart</a>
    <a href="{% url 'home' %}" class="btn btn-outline">Go Home</a>
  </div>
</div>
{% endblock %}
